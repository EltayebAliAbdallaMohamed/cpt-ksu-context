<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q Skills Audio Platform - Interactive Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .presentation-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .slide-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #764ba2;
            flex-wrap: wrap;
            gap: 15px;
        }

        .slide-title {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
            flex: 1;
            min-width: 200px;
        }

        .slide-counter {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .search-box-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .search-box-container label {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.9);
        }

        #slideSearch {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            width: 150px;
            font-size: 13px;
            color: #333;
        }

        #slideSearch::placeholder {
            color: #999;
        }

        #slideSearch:focus {
            outline: 2px solid #ffc107;
            outline-offset: 2px;
        }

        .search-suggestions {
            position: absolute;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
            min-width: 250px;
            top: 45px;
            left: 0;
        }

        .search-suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: #f0f8ff;
            color: #667eea;
            font-weight: 600;
        }

        .suggestion-item.selected {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .suggestion-number {
            font-weight: 700;
            color: #667eea;
            margin-right: 8px;
        }

        .suggestion-item.selected .suggestion-number {
            color: #ffc107;
        }

        .slide-content {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
        }

        .audience-question {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #856404;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
        }

        .content-section {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        details {
            padding: 20px;
        }

        details > summary {
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            padding: 10px;
            user-select: none;
            display: flex;
            align-items: center;
            font-size: 16px;
            transition: color 0.2s;
        }

        details > summary:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        details > summary::before {
            content: "▶ ";
            display: inline-block;
            margin-right: 8px;
            transition: transform 0.2s;
        }

        details[open] > summary::before {
            transform: rotate(90deg);
        }

        details > summary::-webkit-details-marker {
            display: none;
        }

        .detail-content {
            padding: 15px 10px;
            color: #555;
            line-height: 1.7;
        }

        .detail-content h3 {
            color: #667eea;
            margin-top: 15px;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .detail-content h3:first-child {
            margin-top: 0;
        }

        .detail-content ul, .detail-content ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .detail-content li {
            margin-bottom: 6px;
        }

        .detail-content p {
            margin-bottom: 12px;
        }

        .detail-content strong {
            color: #333;
        }

        .detail-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 14px;
        }

        .detail-content table th,
        .detail-content table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .detail-content table th {
            background: #e9ecef;
            font-weight: 600;
            color: #667eea;
        }

        .detail-content table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .slide-navigation {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            padding: 30px 40px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            min-width: 120px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .slide-info {
            font-size: 14px;
            color: #666;
            margin: 0 20px;
            min-width: 60px;
        }

        .agenda-list {
            list-style: none;
            padding: 0;
        }

        .agenda-list li {
            padding: 12px 20px;
            margin-bottom: 8px;
            background: white;
            border-left: 4px solid #667eea;
            font-size: 16px;
            color: #333;
        }

        .agenda-list li:hover {
            background: #f8f9fa;
        }

        @media (max-width: 768px) {
            .slide-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
            }

            .slide-title {
                font-size: 22px;
            }

            .search-box-container {
                width: 100%;
            }

            #slideSearch {
                width: 100%;
            }

            .slide-content {
                padding: 30px 20px;
            }

            .audience-question {
                font-size: 16px;
                padding: 18px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
                min-width: 100px;
            }

            .slide-navigation {
                padding: 20px;
                flex-wrap: wrap;
            }
        }

        @media print {
            body {
                background: white;
            }

            .presentation-container {
                box-shadow: none;
                max-width: 100%;
            }

            .slide-navigation {
                display: none;
            }

            .search-box-container {
                display: none;
            }
        }

        button:focus, details > summary:focus {
            outline: 3px solid #ffc107;
            outline-offset: 2px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body role="document">

    <div class="presentation-container" role="main">
        
        <header class="slide-header">
            <h1 class="slide-title" id="slideTitle">Presentation Title</h1>
            <div class="slide-counter" id="slideCounter">Slide 1 of 19</div>
            
            <div class="search-box-container">
                <label for="slideSearch">Jump to:</label>
                <input 
                    type="text" 
                    id="slideSearch" 
                    placeholder="Slide # or title..." 
                    aria-label="Search for slide by number or title"
                    autocomplete="off"
                />
                <div class="search-suggestions" id="searchSuggestions" role="listbox"></div>
            </div>
        </header>

        <section class="slide-content" id="slideContent">
            <!-- Slides will be dynamically inserted here -->
        </section>

        <nav class="slide-navigation" role="navigation" aria-label="Slide navigation">
            <button id="prevBtn" aria-label="Previous slide">← Previous</button>
            <span class="slide-info" id="slideInfo">1 / 19</span>
            <button id="nextBtn" aria-label="Next slide">Next →</button>
        </nav>
    </div>

    <script>
        // Presentation data
        const slides = [
            // Slide 1: Agenda
            {
                title: "Agenda",
                question: " Topics we will cover today and what you can expect to learn.",
                content: `
                    <h3>Today's Topics</h3>
                    <ul class="agenda-list">
                        <li><strong>Section 1:</strong> Introduction & Institutional Context</li>
                        <li><strong>Section 2:</strong> Theoretical Foundations (SLA Research)</li>
                        <li><strong>Section 3:</strong> Three Core Use Cases</li>
                        <li><strong>Section 4:</strong> Implementation Strategies</li>
                        <li><strong>Section 5:</strong> Next Steps & Questions</li>
                    </ul>
                    <h3 style="margin-top: 25px;">Learning Outcomes</h3>
                    <p>By the end of this presentation, you will understand:</p>
                    <ul>
                        <li>How the Q Skills Audio Platform addresses a documented pedagogical gap</li>
                        <li>Research-based theoretical foundations supporting the platform design</li>
                        <li>How to implement the platform across three distinct pedagogical contexts</li>
                        <li>Specific accommodation strategies for weak learners and visually impaired students</li>
                        <li>Practical, time-managed integration within KSU's 75-minute session structure</li>
                    </ul>
                `
            },


            // Slide 2: The Problem
            {
                title: "The Problem",
                question: "What challenges do teachers face when using Oxford's classroom presentation tool?",
                content: `
                    <h3>Oxford Player Limitation</h3>
                    <p>Oxford's classroom presentation tool can play full-length audio files that come with Q Skills for Success, BUT:</p>
                    <ul>
                        <li><strong>Full tracks are too long</strong> for weak/visually impaired learners (often 6-12 minutes)</li>
                        <li><strong>Learners get lost</strong> in longer segments; cannot focus on specific language points</li>
                        <li><strong>Hard to manage</strong> multiple listening exposures within time-constrained sessions</li>
                        <li><strong>Cannot support</strong> segmented, chunked audio files created by teachers</li>
                    </ul>

                    <h3>Teacher Solution at KSU</h3>
                    <p>Many teachers segment longer audio tracks into shorter chunks (30 seconds to 2 minutes) to:</p>
                    <ul>
                        <li>Manage cognitive load for weak learners</li>
                        <li>Support accessibility for visually impaired students</li>
                        <li>Enable multiple listening exposures within 75-minute sessions</li>
                        <li>Focus on specific vocabulary or grammar points</li>
                    </ul>

                    <h3>The Gap</h3>
                    <p><strong>Oxford's player will not play these custom-chunked audio files.</strong></p>
                    <p>The Q Skills Audio Platform bridges this gap by providing a dedicated player for custom-chunked audio segments.</p>
                `
            },

            // Slide 3: Institutional Context
            {
                title: "King Saud University Context",
                question: "What are the key constraints and opportunities in our teaching environment?",
                content: `
                    <h3>First Common Year Structure</h3>
                    <table>
                        <tr>
                            <th>Aspect</th>
                            <th>Specification</th>
                        </tr>
                        <tr>
                            <td>Duration</td>
                            <td>8-week semester</td>
                        </tr>
                        <tr>
                            <td>Frequency</td>
                            <td>5 days per week</td>
                        </tr>
                        <tr>
                            <td>Session Length</td>
                            <td>75 minutes</td>
                        </tr>
                        <tr>
                            <td>Total Hours</td>
                            <td>~31.25 hours per semester</td>
                        </tr>
                        <tr>
                            <td>Student Requirement</td>
                            <td>Mandatory for all First Common Year students</td>
                        </tr>
                    </table>

                    <h3>Proficiency Levels</h3>
                    <p>Placement-based cohort grouping using diagnostic test:</p>
                    <ul>
                        <li><strong>Q Skills Intro:</strong> CEFR A1 (lower-performing students; includes visually impaired cohort)</li>
                        <li><strong>Q Skills 1:</strong> CEFR A1/A2</li>
                        <li><strong>Q Skills 2:</strong> CEFR A2</li>
                        <li><strong>Q Skills 3:</strong> CEFR A2/B1</li>
                        <li><strong>Q Skills 4:</strong> CEFR B1</li>
                        <li><strong>Q Skills 5:</strong> CEFR B1/B2</li>
                    </ul>

                    <h3>Special Considerations</h3>
                    <ul>
                        <li>Visually impaired students in Q Skills Intro cohort (listening/speaking focus)</li>
                        <li>Mixed-proficiency groups within each cohort (within-group differentiation needed)</li>
                        <li>Time constraints (75 minutes limits content coverage and activity variety)</li>
                        <li>Students' first language is Arabic (Arabic scaffolding valuable for weak learners)</li>
                    </ul>
                `
            },

            // Slide 4: Platform Overview
            {
                title: "Q Skills Audio Platform - Overview",
                question: "What core functions should a teaching tool provide?",
                content: `
                    <h3>Platform Purpose</h3>
                    <p>A web-based audio player designed to:</p>
                    <ul>
                        <li>Play custom-chunked audio segments organized by unit and lesson</li>
                        <li>Support scaffolding through multiple representation modes</li>
                        <li>Enable efficient navigation via search functionality</li>
                        <li>Integrate formative assessment through quiz mode</li>
                        <li>Maintain full accessibility for visually impaired learners</li>
                    </ul>

                    <h3>Three Core Functions</h3>
                    <ol>
                        <li><strong>Classroom Instruction:</strong> Delivers chunked audio with strategic scaffolding (Arabic TTS, English TTS, definitions, illustrations)</li>
                        <li><strong>Independent Study:</strong> Enables self-paced review; supports visually impaired student independence; scaffolding available as needed</li>
                        <li><strong>Test Preparation:</strong> Search/jump functionality allows quick navigation to specific vocabulary/grammar points; reduces revision time</li>
                    </ol>

                    <h3>Key Design Principles</h3>
                    <ul>
                        <li><strong>Audio-First Design:</strong> Audio is primary input; text/translation are supplementary supports</li>
                        <li><strong>Universal Design:</strong> Accessibility features benefit all learners, not only those with disabilities</li>
                        <li><strong>Scaffolding Flexibility:</strong> Teachers and students choose when and how much support to use</li>
                        <li><strong>Time-Efficient:</strong> Supports 75-minute session constraints through focused, chunked content</li>
                    </ul>
                `
            },

            // Slide 5: Cognitive Load Theory
            {
                title: "Cognitive Load Theory & Audio Chunking",
                question: "Why do you think shorter audio segments might support learning better than long ones?",
                content: `
                    <h3>The Theory</h3>
                    <p><strong>Cognitive Load Theory (Sweller, 1988)</strong> states that working memory has limited capacity. When language learners process extended audio input, cognitive resources are consumed by:</p>
                    <ul>
                        <li>Acoustic processing (hearing individual sounds)</li>
                        <li>Phonological processing (recognizing word boundaries)</li>
                        <li>Semantic processing (extracting meaning)</li>
                        <li>Integration with prior knowledge</li>
                    </ul>

                    <h3>The Problem</h3>
                    <p>For weak learners and visually impaired students, extended audio may overload working memory <strong>before semantic processing occurs</strong>.</p>

                    <h3>The Solution: Audio Chunking</h3>
                    <p>Shorter audio segments (30-120 seconds) allow:</p>
                    <ul>
                        <li>Focused attention on discrete language units</li>
                        <li>Reduced extraneous cognitive load during initial exposure</li>
                        <li>Strategic replay and multiple exposures without overwhelming learners</li>
                        <li>Better accommodation of learners with diverse processing speeds</li>
                    </ul>

                    <h3>Research Support</h3>
                    <ul>
                        <li><strong>Chun & Plass (1996):</strong> Segmented multimedia presentations improve comprehension for lower-proficiency learners</li>
                        <li><strong>Mayer & Moreno (2003):</strong> Shorter segments with strategic pauses support deeper processing</li>
                        <li><strong>Winke et al. (2013):</strong> L2 listeners benefit from segmented authentic material</li>
                    </ul>
                `
            },

            // Slide 6: Universal Design for Learning
            {
                title: "Universal Design for Learning (UDL) & Accessibility",
                question: "How can we ensure all students, including those with visual impairments, have equal access to learning?",
                content: `
                    <h3>Three UDL Principles</h3>
                    <table>
                        <tr>
                            <th>Principle</th>
                            <th>Definition</th>
                            <th>Platform Implementation</th>
                        </tr>
                        <tr>
                            <td>Multiple Means of Representation</td>
                            <td>Present information in multiple modalities</td>
                            <td>Audio + English TTS + Arabic TTS + Script text</td>
                        </tr>
                        <tr>
                            <td>Multiple Means of Action & Expression</td>
                            <td>Allow learners to demonstrate understanding through varied channels</td>
                            <td>Keyboard navigation; quiz mode; speaking practice</td>
                        </tr>
                        <tr>
                            <td>Multiple Means of Engagement</td>
                            <td>Support motivation through choice and autonomy</td>
                            <td>Student choice to use scaffolding; self-paced review</td>
                        </tr>
                    </table>

                    <h3>Accessibility for Visually Impaired Learners</h3>
                    <p>The platform provides:</p>
                    <ul>
                        <li><strong>Full keyboard navigation:</strong> Arrow keys for clip navigation; keyboard-accessible buttons</li>
                        <li><strong>Screen reader compatibility:</strong> Semantic HTML, ARIA labels for all interactive elements</li>
                        <li><strong>Text-to-speech:</strong> English and Arabic TTS for script reading</li>
                        <li><strong>Audio-first design:</strong> Audio is primary; text is supplementary</li>
                    </ul>

                    <h3>Key Outcome</h3>
                    <p><strong>Visually impaired students achieve complete independence</strong> in accessing course material without requiring sighted peer support.</p>

                    <h3>Research Support</h3>
                    <ul>
                        <li><strong>Rose & Gravel (2010):</strong> UDL benefits all learners, not just those with disabilities</li>
                        <li><strong>Burgstahler & Cory (2008):</strong> Universal design in higher education improves diverse learner outcomes</li>
                    </ul>
                `
            },

            // Slide 7: Scaffolding & Autonomy
            {
                title: "Scaffolding & Gradual Autonomy Development",
                question: "How should teacher support change as students become more independent?",
                content: `
                    <h3>The Concept: Zone of Proximal Development (ZPD)</h3>
                    <p><strong>Vygotsky's ZPD</strong> describes the gap between what learners can do independently and what they can do <strong>with support</strong>. Effective teaching operates in this zone, gradually withdrawing support as competence increases.</p>

                    <h3>Scaffolding Hierarchy in the Platform</h3>
                    <p><strong>Students choose support level based on confidence:</strong></p>
                    <ul>
                        <li><strong>Level 3 (Extensive):</strong> Audio × multiple repeats → English script → Arabic TTS → Vocabulary definitions</li>
                        <li><strong>Level 2 (Moderate):</strong> Audio × 2 → English script → Optional Arabic TTS</li>
                        <li><strong>Level 1 (Minimal):</strong> Audio only (no script) → Challenge with script scrambling</li>
                    </ul>

                    <h3>Progression Framework</h3>
                    <table>
                        <tr>
                            <th>Week</th>
                            <th>Weak Learner Support Level</th>
                            <th>Arabic TTS Use</th>
                        </tr>
                        <tr>
                            <td>Week 1-2</td>
                            <td>Level 3 (Extensive)</td>
                            <td>Frequently available</td>
                        </tr>
                        <tr>
                            <td>Week 3-4</td>
                            <td>Level 2-3 (Transition)</td>
                            <td>Strategic/selective</td>
                        </tr>
                        <tr>
                            <td>Week 5-6</td>
                            <td>Level 2 (Moderate)</td>
                            <td>Rare; difficult items only</td>
                        </tr>
                        <tr>
                            <td>Week 7-8</td>
                            <td>Level 1 (Minimal)</td>
                            <td>Not used</td>
                        </tr>
                    </table>

                    <h3>Key Point</h3>
                    <p>Scaffolding reduction is <strong>strategic and progressive</strong>, not abrupt. Teachers monitor learner confidence and adjust support gradually.</p>

                    <h3>Research Support</h3>
                    <ul>
                        <li><strong>Lantolf & Thorne (2006):</strong> Scaffolding is essential for moving learners through ZPD</li>
                        <li><strong>De Guerrero & Villamil (2000):</strong> Strategic reduction of support develops learner autonomy</li>
                    </ul>
                `
            },

            // Slide 8: Formative Assessment
            {
                title: "Formative Assessment & Learning Feedback",
                question: "How can ongoing feedback during learning help students understand what they need to improve?",
                content: `
                    <h3>Definition & Importance</h3>
                    <p><strong>Formative assessment</strong> provides ongoing feedback <strong>during learning</strong> to support metacognitive awareness and learning adjustment. Hattie (2012) identifies formative feedback as one of the <strong>highest-impact factors on student achievement</strong>.</p>

                    <h3>Platform Quiz Mode Features</h3>
                    <ul>
                        <li><strong>Immediate feedback:</strong> Correct/incorrect responses with explanations provided instantly</li>
                        <li><strong>Low-stakes assessment:</strong> Quiz results don't contribute to grades (formative, not summative)</li>
                        <li><strong>Self-assessment opportunity:</strong> Learners identify areas for revision</li>
                        <li><strong>Focused feedback:</strong> Identifies specific vocabulary/grammar misunderstandings</li>
                    </ul>

                    <h3>Classroom Implementation (75-minute session)</h3>
                    <table>
                        <tr>
                            <th>Minute</th>
                            <th>Activity</th>
                            <th>Assessment Function</th>
                        </tr>
                        <tr>
                            <td>0-10</td>
                            <td>Vocabulary preview</td>
                            <td>Teacher observes: Can learners recognize target vocabulary?</td>
                        </tr>
                        <tr>
                            <td>30-45</td>
                            <td>Listening & comprehension</td>
                            <td>Teacher checks: Can learners answer questions about content?</td>
                        </tr>
                        <tr>
                            <td>60-70</td>
                            <td><strong>Platform Quiz</strong></td>
                            <td>Quantified comprehension check; specific feedback provided</td>
                        </tr>
                        <tr>
                            <td>70-75</td>
                            <td>Reflection & discussion</td>
                            <td>Teacher addresses misunderstandings revealed by quiz</td>
                        </tr>
                    </table>

                    <h3>Independent Study Integration</h3>
                    <ul>
                        <li>Student takes quiz for self-assessment</li>
                        <li>Feedback identifies specific gaps</li>
                        <li>Student returns to specific clips addressing misunderstood items</li>
                        <li>Student retakes quiz; monitors own progress</li>
                    </ul>

                    <h3>Research Support</h3>
                    <ul>
                        <li><strong>Black & Wiliam (1998):</strong> Formative assessment significantly improves learning outcomes</li>
                        <li><strong>Brookfield & Preskill (2005):</strong> Low-stakes quizzes support retention and transfer</li>
                        <li><strong>Hattie (2012):</strong> Feedback specificity and immediacy are critical factors</li>
                    </ul>
                `
            },

            // Slide 9: CEFR Alignment
            {
                title: "CEFR Alignment Across Q Skills Levels",
                question: "How should implementation differ across proficiency levels?",
                content: `
                    <h3>Implementation by Level</h3>
                    <table>
                        <tr>
                            <th>Q Skills Level</th>
                            <th>CEFR</th>
                            <th>Audio Length (typical)</th>

        // State management
        let currentSlide = 0;
        let searchHighlight = -1;

        // DOM elements
        const slideTitle = document.getElementById('slideTitle');
        const slideCounter = document.getElementById('slideCounter');
        const slideContent = document.getElementById('slideContent');
        const slideInfo = document.getElementById('slideInfo');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const slideSearch = document.getElementById('slideSearch');
        const searchSuggestions = document.getElementById('searchSuggestions');

        // Initialize presentation
        function init() {
            renderSlide();
            setupEventListeners();
        }

        // Render current slide
        function renderSlide() {
            const slide = slides[currentSlide];
            
            // Update header
            slideTitle.textContent = slide.title;
            slideCounter.textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
            
            // Update slide info
            slideInfo.textContent = `${currentSlide + 1} / ${slides.length}`;
            
            // Update content
            slideContent.innerHTML = `
                <div class="audience-question">${slide.question}</div>
                <div class="content-section">
                    <details>
                        <summary>Click to reveal content</summary>
                        <div class="detail-content">
                            ${slide.content}
                        </div>
                    </details>
                </div>
            `;
            
            // Add fade animation
            slideContent.classList.add('fade-in');
            
            // Update button states
            updateButtonStates();
            
            // Clear search
            slideSearch.value = '';
            searchSuggestions.classList.remove('active');
            searchSuggestions.innerHTML = '';
            
            // Reset details to closed state
            const allDetails = slideContent.querySelectorAll('details');
            allDetails.forEach(detail => detail.open = false);
        }

        // Update button states
        function updateButtonStates() {
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
        }

        // Navigate to next slide
        function goToNextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        // Navigate to previous slide
        function goToPreviousSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        // Jump to specific slide
        function jumpToSlide(slideNumber) {
            const index = slideNumber - 1;
            if (index >= 0 && index < slides.length) {
                currentSlide = index;
                renderSlide();
                searchSuggestions.classList.remove('active');
            }
        }

        // Handle search input
        function handleSearch(e) {
            const query = e.target.value.trim().toLowerCase();
            
            if (!query) {
                searchSuggestions.classList.remove('active');
                searchSuggestions.innerHTML = '';
                return;
            }

            // Search by slide number
            const slideNumber = parseInt(query, 10);
            if (!isNaN(slideNumber) && slideNumber > 0 && slideNumber <= slides.length) {
                displaySearchSuggestions(query, slideNumber);
                return;
            }

            // Search by title
            const matches = slides
                .map((slide, index) => ({
                    number: index + 1,
                    title: slide.title,
                    index
                }))
                .filter(item => item.title.toLowerCase().includes(query));

            if (matches.length > 0) {
                displayTitleMatches(matches);
            } else {
                searchSuggestions.classList.remove('active');
            }
        }

        // Display search suggestions for slide numbers
        function displaySearchSuggestions(query, slideNumber) {
            const slide = slides[slideNumber - 1];
            searchSuggestions.innerHTML = `
                <div class="suggestion-item" onclick="jumpToSlide(${slideNumber})">
                    <span class="suggestion-number">Slide ${slideNumber}</span>
                    <span>${slide.title}</span>
                </div>
            `;
            searchSuggestions.classList.add('active');
        }

        // Display title matches
        function displayTitleMatches(matches) {
            searchSuggestions.innerHTML = matches
                .map(item => `
                    <div class="suggestion-item" onclick="jumpToSlide(${item.number})">
                        <span class="suggestion-number">Slide ${item.number}</span>
                        <span>${item.title}</span>
                    </div>
                `)
                .join('');
            searchSuggestions.classList.add('active');
        }

        // Setup event listeners
        function setupEventListeners() {
            nextBtn.addEventListener('click', goToNextSlide);
            prevBtn.addEventListener('click', goToPreviousSlide);
            
            // Search functionality
            slideSearch.addEventListener('input', handleSearch);
            slideSearch.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = slideSearch.value.trim();
                    const slideNumber = parseInt(query, 10);
                    if (!isNaN(slideNumber)) {
                        jumpToSlide(slideNumber);
                    }
                }
            });
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    goToNextSlide();
                } else if (e.key === 'ArrowLeft') {
                    goToPreviousSlide();
                }
            });

            // Close suggestions when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-box-container')) {
                    searchSuggestions.classList.remove('active');
                }
            });
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
